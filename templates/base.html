<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OCスケジュール{% endblock %} - 旭川市立大学</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    @media print {
      .no-print { display: none !important; }
      .navbar { display: none !important; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary no-print">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">OCスケジューラ</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint and request.endpoint.startswith('occasions') %}active{% endif %}"
               href="/">開催管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint and request.endpoint.startswith('master') %}active{% endif %}"
               href="/master">マスタ管理</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint and request.endpoint.startswith('year_update') %}active{% endif %}"
               href="/year-update">年度更新</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show no-print" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
